<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wisdom Luxury</title>

    <!-- 你的 Meta Pixel 已安装 -->

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Helvetica Neue", Arial, sans-serif;
        }
        body {
            background-color: #0a0a0a;
            color: #fff;
            text-align: center;
            padding: 20px;
            padding-bottom: 130px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        /* 品牌头像 */
        .brand-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 10px;
        }
        .brand-avatar {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #d4af37;
        }
        .brand-title h1 {
            font-size: 22px;
            color: #d4af37;
        }
        .brand-title p {
            font-size: 12px;
            color: #ccc;
        }

        /* 悬浮LINE按钮（核心优化：解决文字重叠问题） */
        .floating-cta {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            width: 92%;
            max-width: 380px;
            background: rgba(26, 26, 26, 0.95); /* 新增：半透明深色背景 */
            border-radius: 15px;
            padding: 15px 10px 10px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
        }
        .floating-cta-button {
            background-color: #25d366;
            color: #fff;
            border: none;
            padding: 16px 20px;
            font-size: 17px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            display: block;
            box-shadow: 0 0 20px rgba(37,211,102,0.4);
            animation: flash 1.6s infinite alternate;
            position: relative;
            margin-bottom: 10px;
        }
        .floating-cta-button:after {
            content: "👉";
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            animation: move 1s infinite;
        }
        @keyframes flash {
            0% { box-shadow: 0 0 15px rgba(37,211,102,0.4); }
            100% { box-shadow: 0 0 30px rgba(37,211,102,0.8); }
        }
        @keyframes move {
            0% { right:18px; }
            50% { right:12px; }
            100% { right:18px; }
        }
        .cta-desc {
            color: #d4af37;
            font-size: 13px;
            margin-top: 8px;
            line-height: 1.4;
            font-weight: bold;
            /* 优化：文字背景已由外层floating-cta提供 */
        }

        /* 首屏 */
        .hero {
            padding: 10px 0 15px;
        }
        .hero p {
            font-size: 14px;
            color: #ccc;
            line-height: 1.4;
        }

        /* 3个功能栏（手机一行） */
        .features {
            display: flex;
            gap: 8px;
            margin: 15px 0 30px;
        }
        .feature-card {
            flex:1;
            background:#1a1a1a;
            padding:12px 6px;
            border-radius:10px;
        }
        .feature-card .icon {
            font-size:18px;
            color:#d4af37;
            margin-bottom:4px;
        }
        .feature-card h3 {
            font-size:11px;
            color:#fff;
        }
        .feature-card p {
            font-size:9px;
            color:#aaa;
            margin-top:2px;
        }

        /* 标题样式 */
        .gallery h2,
        .qc-gallery h2,
        .review-gallery h2 {
            font-size:17px;
            color:#d4af37;
            margin-bottom:15px;
        }

        /* QC 4图 */
        .qc-grid {
            display:grid;
            grid-template-columns:repeat(4,1fr);
            gap:8px;
        }
        /* 客户反馈 2图 */
        .review-grid {
            display:grid;
            grid-template-columns:repeat(2,1fr);
            gap:8px;
        }
        /* 产品 4图 */
        .gallery-grid {
            display:grid;
            grid-template-columns:repeat(2,1fr);
            gap:10px;
        }

        /* 图片点击放大 */
        .qc-grid img,
        .review-grid img,
        .gallery-grid img {
            width:100%;
            border-radius:8px;
            aspect-ratio:1/1;
            object-fit:cover;
            cursor:zoom-in;
        }

        /* 图片弹窗 */
        .lightbox {
            display:none;
            position:fixed;
            top:0; left:0;
            width:100%; height:100%;
            background:rgba(0,0,0,0.95);
            z-index:9999;
            padding:40px 20px;
        }
        .lightbox-img {
            max-width:95%;
            max-height:85vh;
            margin:auto;
            display:block;
            border-radius:10px;
        }
        .close {
            position:absolute;
            top:20px; right:25px;
            color:#fff;
            font-size:36px;
            cursor:pointer;
        }

        .footer {
            margin-top:40px;
            font-size:11px;
            color:#666;
            line-height:1.4;
        }
    </style>
</head>

<body>

<!-- 图片放大 -->
<div id="lightbox" class="lightbox">
    <span class="close" onclick="closeLightbox()">&times;</span>
    <img src="" id="lightbox-img" class="lightbox-img">
</div>

<!-- 悬浮LINE按钮 + 已加像素点击追踪 -->
<div class="floating-cta">
    <a href="https://line.me/ti/p/fuj9ICOS-f" class="floating-cta-button" onclick="fbq('track', 'LineButtonClick')">
        📱 LINEを追加
    </a>
    <div class="cta-desc">
        高画質ディテール・QC動画・お客様の声・全商品カタログ<br>LINEで全部無料受け取れます ✨
    </div>
</div>

<div class="container">

    <!-- 品牌头像（首屏核心图，不开启懒加载） -->
    <div class="brand-header">
        <img src="https://i.imgur.com/friQ8h0.png" class="brand-avatar" alt="ブランドアイコン">
        <div class="brand-title">
            <h1>Wisdom Luxury</h1>
            <p>高級ラグジュアリー専門</p>
        </div>
    </div>

    <!-- 首屏 -->
    <div class="hero">
        <p>厳選素材・職人技術<br>24項目 品質チェック済</p>
    </div>

    <!-- 3个品质模块 -->
    <div class="features">
        <div class="feature-card">
            <div class="icon">🔍</div>
            <h3>徹底品質</h3>
            <p>細部まで丁寧に検品</p>
        </div>
        <div class="feature-card">
            <div class="icon">✨</div>
            <h3>上質素材</h3>
            <p>確かな質感と素材</p>
        </div>
        <div class="feature-card">
            <div class="icon">📦</div>
            <h3>安心発送</h3>
            <p>日本国内お届け</p>
        </div>
    </div>

    <!-- QC 细节图（已替换链接 + 懒加载） -->
    <div class="qc-gallery">
        <h2>🔎 ディテールチェック</h2>
        <div class="qc-grid">
            <img src="https://i.imgur.com/kR2XX6D.jpeg" loading="lazy" onclick="openLightbox(this.src)" alt="QC詳細1">
            <img src="https://i.imgur.com/MFjAKpO.jpeg" loading="lazy" onclick="openLightbox(this.src)" alt="QC詳細2">
            <img src="https://i.imgur.com/22WnqNO.jpeg" loading="lazy" onclick="openLightbox(this.src)" alt="QC詳細3">
            <img src="https://i.imgur.com/1OlUMOc.jpeg" loading="lazy" onclick="openLightbox(this.src)" alt="QC詳細4">
        </div>
    </div>

    <!-- 客户反馈 -->
    <div class="review-gallery" style="margin:35px 0">
        <h2>💬 お客様の声</h2>
        <div class="review-grid">
            <img src="https://i.imgur.com/wpjPMGe.jpeg" loading="lazy" onclick="openLightbox(this.src)" alt="お客様の声1">
            <img src="https://i.imgur.com/UD9qr9C.jpeg" loading="lazy" onclick="openLightbox(this.src)" alt="お客様の声2">
        </div>
    </div>

    <!-- 热门产品图（已替换链接 + 懒加载） -->
    <div class="gallery">
        <h2>🛍️ ラインナップ</h2>
        <div class="gallery-grid">
            <img src="https://i.imgur.com/ESAZOrk.jpeg" loading="lazy" onclick="openLightbox(this.src)" alt="人気商品1">
            <img src="https://i.imgur.com/aYJlBHL.jpeg" loading="lazy" onclick="openLightbox(this.src)" alt="人気商品2">
            <img src="https://i.imgur.com/V6OKaFb.jpeg" loading="lazy" onclick="openLightbox(this.src)" alt="人気商品3">
            <img src="https://i.imgur.com/lC6XOPg.jpeg" loading="lazy" onclick="openLightbox(this.src)" alt="人気商品4">
        </div>
    </div>

    <div class="footer">
        <p>✅ 安心対応 ✅ アフターサポート</p>
        <br>
        <p>© 2026 Wisdom Luxury</p>
    </div>

</div>

<script>
    function openLightbox(src) {
        document.getElementById("lightbox-img").src = src;
        document.getElementById("lightbox").style.display = "block";
        document.body.style.overflow = "hidden";
    }
    function closeLightbox() {
        document.getElementById("lightbox").style.display = "none";
        document.body.style.overflow = "auto";
    }
    document.getElementById("lightbox").onclick = function(e){
        if(e.target === this) closeLightbox();
    }
</script>

</body>
</html>
