<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wisdom Luxury 高級ラグジュアリー専門店</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Helvetica Neue", Arial, sans-serif;
        }
        body {
            background-color: #0a0a0a;
            color: #fff;
            text-align: center;
            padding: 20px;
            padding-bottom: 100px; /* 给悬浮按钮留底部空间 */
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        /* 悬浮Line按钮（核心优化） */
        .floating-cta {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            width: 90%;
            max-width: 400px;
        }
        .floating-cta-button {
            background-color: #25d366;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            display: block;
            box-shadow: 0 4px 20px rgba(37, 211, 102, 0.4);
        }

        /* 模块1：首屏品牌区 */
        .hero {
            padding: 30px 0;
        }
        .hero h1 {
            font-size: 32px;
            color: #d4af37;
            margin-bottom: 10px;
        }
        .hero p {
            font-size: 16px;
            color: #ccc;
            line-height: 1.5;
        }

        /* 模块2：品质背书区 */
        .features {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 30px 0;
            flex-wrap: wrap;
        }
        .feature-card {
            background: #1a1a1a;
            padding: 18px;
            border-radius: 12px;
            width: 140px;
        }
        .feature-card .icon {
            font-size: 24px;
            margin-bottom: 8px;
            color: #d4af37;
        }
        .feature-card h3 {
            font-size: 14px;
            margin-bottom: 5px;
            color: #fff;
        }
        .feature-card p {
            font-size: 11px;
            color: #aaa;
            line-height: 1.3;
        }

        /* 模块3：QC细节展示区（新增） */
        .qc-gallery {
            margin: 40px 0;
        }
        .qc-gallery h2 {
            font-size: 20px;
            margin-bottom: 20px;
            color: #d4af37;
        }
        .qc-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        .qc-grid img {
            width: 100%;
            border-radius: 8px;
            object-fit: cover;
            aspect-ratio: 1/1;
        }

        /* 模块4：客户反馈图片区（新增） */
        .review-gallery {
            margin: 40px 0;
        }
        .review-gallery h2 {
            font-size: 20px;
            margin-bottom: 20px;
            color: #d4af37;
        }
        .review-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
        .review-grid img {
            width: 100%;
            border-radius: 8px;
            object-fit: cover;
            aspect-ratio: 1/1;
        }

        /* 模块5：热门款式区 */
        .gallery {
            margin: 40px 0;
        }
        .gallery h2 {
            font-size: 20px;
            margin-bottom: 20px;
            color: #d4af37;
        }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
        .gallery-grid img {
            width: 100%;
            border-radius: 8px;
            object-fit: cover;
            aspect-ratio: 1/1;
        }

        /* 模块6：底部承诺区 */
        .footer {
            margin-top: 50px;
            color: #666;
            font-size: 12px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <!-- 悬浮Line按钮（固定在底部，一直可见） -->
    <div class="floating-cta">
        <a href="https://line.me/R/ti/p/你的LineID" class="floating-cta-button">
            📱 LINEを追加する
        </a>
    </div>

    <div class="container">
        <!-- 模块1：首屏品牌区 -->
        <div class="hero">
            <h1>✨ Wisdom Luxury ✨</h1>
            <p>高級ラグジュアリー専門店<br>1:1 オリジナル再現 | 24項目品質チェック済み</p>
        </div>

        <!-- 模块2：品质背书区 -->
        <div class="features">
            <div class="feature-card">
                <div class="icon">🔍</div>
                <h3>徹底品質チェック</h3>
                <p>素材・縫製・金具まで、24項目のQCを実施</p>
            </div>
            <div class="feature-card">
                <div class="icon">🎨</div>
                <h3>オリジナル再現</h3>
                <p>本物と同じレザー・糸・部品を使用</p>
            </div>
            <div class="feature-card">
                <div class="icon">📦</div>
                <h3>安全発送</h3>
                <p>日本国内発送・追跡番号付き・丁寧梱包</p>
            </div>
        </div>

        <!-- 模块3：QC细节展示区（新增） -->
        <div class="qc-gallery">
            <h2>🔎 QCディテールチェック</h2>
            <div class="qc-grid">
                <!-- 这里放4张QC细节图链接 -->
                <img src="https://i.imgur.com/AnvMrLb.jpeg" alt="レザーの質感">
                <img src="https://i.imgur.com/WcdE9Lb.jpeg" alt="金具の輝き">
                <img src="https://i.imgur.com/k3vCVKS.jpeg" alt="縫製の細部">
                <img src="https://i.imgur.com/NMpAVxE.jpeg" alt="刻印の再現">
            </div>
        </div>

        <!-- 模块4：客户反馈图片区（新增） -->
        <div class="review-gallery">
            <h2>💬 お客様の声</h2>
            <div class="review-grid">
                <!-- 这里放2张客户好评截图/晒单图链接 -->
                <img src="https://i.imgur.com/wpjPMGe.jpeg" alt="お客様の声1">
                <img src="https://i.imgur.com/UD9qr9C.jpeg" alt="お客様の声2">
            </div>
        </div>

        <!-- 模块5：热门款式区 -->
        <div class="gallery">
            <h2>🛍️ 人気ラインナップ</h2>
            <div class="gallery-grid">
                <!-- 这里放4张包包产品图链接 -->
                <img src="https://i.imgur.com/hotov3w.jpeg" alt="シャネルバッグ">
                <img src="https://i.imgur.com/qGArOZm.jpeg" alt="エルメスバッグ">
                <img src="https://i.imgur.com/mFQZvBj.jpeg" alt="ルイヴィトンバッグ">
                <img src="https://i.imgur.com/KkFMuBG.jpeg" alt="ヴァンクリーフ">
            </div>
        </div>

        <!-- 模块6：底部承诺区 -->
        <div class="footer">
            <p>✅ 100%肉眼無差 | ✅ オンライン決済対応 | ✅ アフターサービス対応</p>
            <p>© 2026 Wisdom Luxury. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
