<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wisdom Luxury</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Helvetica Neue", Arial, sans-serif;
        }
        body {
            background-color: #0a0a0a;
            color: #fff;
            text-align: center;
            padding: 20px;
            padding-bottom: 120px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        /* 品牌头像 + 名称 */
        .brand-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 10px;
        }
        .brand-avatar {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #d4af37;
        }
        .brand-title h1 {
            font-size: 22px;
            color: #d4af37;
        }
        .brand-title p {
            font-size: 12px;
            color: #ccc;
        }

        /* 悬浮LINE按钮（闪烁+箭头） */
        .floating-cta {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            width: 92%;
            max-width: 380px;
        }
        .floating-cta-button {
            background-color: #25d366;
            color: #fff;
            border: none;
            padding: 16px 20px;
            font-size: 17px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            display: block;
            box-shadow: 0 0 20px rgba(37,211,102,0.4);
            animation: flash 1.8s infinite alternate;
            position: relative;
        }
        .floating-cta-button:after {
            content: "👉";
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            animation: move 1s infinite;
        }
        @keyframes flash {
            0% { box-shadow: 0 0 15px rgba(37,211,102,0.4); }
            100% { box-shadow: 0 0 25px rgba(37,211,102,0.7); }
        }
        @keyframes move {
            0% { right:18px; }
            50% { right:12px; }
            100% { right:18px; }
        }
        .cta-desc {
            color: #d4af37;
            font-size: 13px;
            margin-top: 8px;
            line-height: 1.4;
            font-weight: bold;
        }

        /* 首屏 */
        .hero {
            padding: 15px 0 10px;
        }
        .hero p {
            font-size: 14px;
            color: #ccc;
        }

        /* 3个功能栏（手机端自动一行，变小） */
        .features {
            display: flex;
            gap: 8px;
            margin: 20px 0 35px;
        }
        .feature-card {
            flex:1;
            background:#1a1a1a;
            padding:12px 8px;
            border-radius:10px;
        }
        .feature-card .icon {
            font-size:18px;
            color:#d4af37;
            margin-bottom:4px;
        }
        .feature-card h3 {
            font-size:11px;
            color:#fff;
        }
        .feature-card p {
            font-size:9px;
            color:#aaa;
            margin-top:2px;
        }

        /* 图片模块共用 */
        .gallery h2,
        .qc-gallery h2,
        .review-gallery h2 {
            font-size:17px;
            color:#d4af37;
            margin-bottom:15px;
        }

        /* QC 4图 */
        .qc-grid {
            display:grid;
            grid-template-columns:repeat(4,1fr);
            gap:8px;
        }
        /* 客户反馈 2图 */
        .review-grid {
            display:grid;
            grid-template-columns:repeat(2,1fr);
            gap:8px;
        }
        /* 产品 4图 */
        .gallery-grid {
            display:grid;
            grid-template-columns:repeat(2,1fr);
            gap:10px;
        }

        /* 所有图片点击放大 */
        .qc-grid img,
        .review-grid img,
        .gallery-grid img {
            width:100%;
            border-radius:8px;
            aspect-ratio:1/1;
            object-fit:cover;
            cursor:zoom-in;
        }

        /* 图片放大弹窗 */
        .lightbox {
            display:none;
            position:fixed;
            top:0; left:0;
            width:100%; height:100%;
            background:rgba(0,0,0,0.95);
            z-index:9999;
            padding:40px 20px;
        }
        .lightbox-img {
            max-width:95%;
            max-height:85vh;
            margin:auto;
            display:block;
            border-radius:10px;
        }
        .close {
            position:absolute;
            top:20px; right:25px;
            color:#fff;
            font-size:36px;
            cursor:pointer;
        }

        .footer {
            margin-top:40px;
            font-size:11px;
            color:#666;
            line-height:1.4;
        }
    </style>
</head>

<body>

<!-- 图片放大弹窗 -->
<div id="lightbox" class="lightbox">
    <span class="close" onclick="closeLightbox()">&times;</span>
    <img src="" id="lightbox-img" class="lightbox-img">
</div>

<!-- 悬浮LINE按钮 -->
<div class="floating-cta">
    <a href="https://line.me/ti/p/fuj9ICOS-f" class="floating-cta-button">
        📱 LINEを追加
    </a>
    <div class="cta-desc">
        高画質ディテール・QC動画・お客様の声・全商品カタログ<br>LINEで全部受け取れます
    </div>
</div>

<div class="container">

    <!-- 品牌头像 -->
    <div class="brand-header">
        <img src="https://i.imgur.com/t4WWC16.png" class="brand-avatar" alt="Logo">
        <div class="brand-title">
            <h1>Wisdom Luxury</h1>
            <p>高級ラグジュアリー専門</p>
        </div>
    </div>

    <!-- 首屏 -->
    <div class="hero">
        <p>厳選素材・職人技術<br>24項目 品質チェック済</p>
    </div>

    <!-- 3个品质模块（手机一行） -->
    <div class="features">
        <div class="feature-card">
            <div class="icon">🔍</div>
            <h3>徹底品質</h3>
            <p>細部まで丁寧に検品</p>
        </div>
        <div class="feature-card">
            <div class="icon">✨</div>
            <h3>上質素材</h3>
            <p>確かな質感と素材</p>
        </div>
        <div class="feature-card">
            <div class="icon">📦</div>
            <h3>安心発送</h3>
            <p>日本国内お届け</p>
        </div>
    </div>

    <!-- QC 细节图 -->
    <div class="qc-gallery">
        <h2>🔎 ディテール</h2>
        <div class="qc-grid">
            <img src="https://i.imgur.com/AnvMrLb.jpeg" onclick="openLightbox(this.src)">
            <img src="https://i.imgur.com/WcdE9Lb.jpeg" onclick="openLightbox(this.src)">
            <img src="https://i.imgur.com/k3vCVKS.jpeg" onclick="openLightbox(this.src)">
            <img src="https://i.imgur.com/NMpAVxE.jpeg" onclick="openLightbox(this.src)">
        </div>
    </div>

    <!-- 客户反馈 -->
    <div class="review-gallery" style="margin:35px 0">
        <h2>💬 お客様の声</h2>
        <div class="review-grid">
            <img src="https://i.imgur.com/wpjPMGe.jpeg" onclick="openLightbox(this.src)">
            <img src="https://i.imgur.com/UD9qr9C.jpeg" onclick="openLightbox(this.src)">
        </div>
    </div>

    <!-- 商品展示 -->
    <div class="gallery">
        <h2>🛍️ ラインナップ</h2>
        <div class="gallery-grid">
            <img src="https://i.imgur.com/hotov3w.jpeg" onclick="openLightbox(this.src)">
            <img src="https://i.imgur.com/qGArOZm.jpeg" onclick="openLightbox(this.src)">
            <img src="https://i.imgur.com/mFQZvBj.jpeg" onclick="openLightbox(this.src)">
            <img src="https://i.imgur.com/KkFMuBG.jpeg" onclick="openLightbox(this.src)">
        </div>
    </div>

    <div class="footer">
        <p>✅ 品質保証 ✅ 安心対応 ✅ アフターサポート</p>
        <br>
        <p>© 2026 Wisdom Luxury</p>
    </div>

</div>

<script>
    function openLightbox(src) {
        document.getElementById("lightbox-img").src = src;
        document.getElementById("lightbox").style.display = "block";
        document.body.style.overflow = "hidden";
    }
    function closeLightbox() {
        document.getElementById("lightbox").style.display = "none";
        document.body.style.overflow = "auto";
    }
    document.getElementById("lightbox").onclick = function(e){
        if(e.target === this) closeLightbox();
    }
</script>

</body>
</html>
